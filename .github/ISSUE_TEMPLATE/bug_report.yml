name: Bug report
description: Report a reproducible problem in InkWall
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include private notes, secrets, IP addresses, or production database contents.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, PHP version, operating system, and deployment type if relevant.
      placeholder: Firefox 128, PHP 8.3, local Nginx deployment
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Add logs or screenshots only after removing private content and credentials.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed secrets, personal data, and private note content.
          required: true
