# Add these locations inside the TLS server for the /inkwall deployment.
location ~ ^/inkwall/api(?:/.*)?$ {
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Cache-Control "no-store" always;
    client_max_body_size 1m;
    include fastcgi_params;
    fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root/inkwall/api.php;
    fastcgi_param PATH_INFO $uri;
}

location = /inkwall/latest.svg {
    include fastcgi_params;
    fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root/inkwall/latest.svg.php;
}

location = /inkwall/app.php { deny all; return 403; }
